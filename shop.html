<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maltezos Auto Service | Έχω τζάι κατάστημα</title>
  <style>
    :root {
      --accent: #d7263d;
      --dark: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Inter", Arial, sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #eef2f7 100%);
      color: var(--dark);
      line-height: 1.7;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 24px 64px;
    }

    .card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 16px 45px rgba(17, 24, 39, 0.08);
      padding: 32px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
      color: var(--accent);
    }

    p {
      color: var(--muted);
      margin: 0 0 20px;
    }

    .btn {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 999px;
      background: var(--accent);
      color: white;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Έχω τζάι κατάστημα</h1>
      <p>Αυτή η σελίδα είναι έτοιμη για το κατάστημα ή την επιπλέον σελίδα που θέλεις να ανοίγει από το μενού.</p>
      <a class="btn" href="index.html">Πίσω στην αρχική</a>
    </div>
  </div>
</body>
</html>
